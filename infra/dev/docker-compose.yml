name: agent_vigilo_dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_vigilo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent_vigilo
    ports:
      - "5432:5432"
    volumes:
      - agent_vigilo_db_data:/var/lib/postgresql/data
    networks:
      - agent_vigilo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_vigilo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: agent_vigilo_mq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - agent_vigilo_mq_data:/var/lib/rabbitmq
    networks:
      - agent_vigilo_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  setup:
    image: rust:latest
    container_name: agent_vigilo_setup
    working_dir: /workspace
    command: ["cargo", "run", "-p", "vigilo", "--", "setup"]
    environment:
      DATABASE_URL: postgresql://postgres:password@agent_vigilo_db:5432/agent_vigilo
      RABBITMQ_URL: amqp://guest:guest@agent_vigilo_mq:5672
    volumes:
      - ../../:/workspace
      - agent_vigilo_cargo_registry:/usr/local/cargo/registry
      - agent_vigilo_cargo_git:/usr/local/cargo/git
      - agent_vigilo_target:/workspace/target
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agent_vigilo_network
    restart: "no"

  coordinator:
    image: rust:latest
    container_name: agent_vigilo_coordinator
    working_dir: /workspace
    command: ["cargo", "run", "-p", "vigilo", "--", "coordinator", "start"]
    environment:
      DATABASE_URL: postgresql://postgres:password@agent_vigilo_db:5432/agent_vigilo
      RABBITMQ_URL: amqp://guest:guest@agent_vigilo_mq:5672
    volumes:
      - ../../:/workspace
      - agent_vigilo_cargo_registry:/usr/local/cargo/registry
      - agent_vigilo_cargo_git:/usr/local/cargo/git
      - agent_vigilo_target:/workspace/target
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks:
      - agent_vigilo_network
    restart: unless-stopped

  worker:
    image: rust:latest
    container_name: agent_vigilo_worker
    working_dir: /workspace
    command: ["cargo", "run", "-p", "vigilo", "--", "worker", "start"]
    environment:
      DATABASE_URL: postgresql://postgres:password@agent_vigilo_db:5432/agent_vigilo
      RABBITMQ_URL: amqp://guest:guest@agent_vigilo_mq:5672
    volumes:
      - ../../:/workspace
      - agent_vigilo_cargo_registry:/usr/local/cargo/registry
      - agent_vigilo_cargo_git:/usr/local/cargo/git
      - agent_vigilo_target:/workspace/target
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks:
      - agent_vigilo_network
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}

volumes:
  agent_vigilo_db_data:
  agent_vigilo_mq_data:
  agent_vigilo_cargo_registry:
  agent_vigilo_cargo_git:
  agent_vigilo_target:

networks:
  agent_vigilo_network:
    driver: bridge
