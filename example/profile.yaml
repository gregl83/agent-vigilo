profile_id: mixed_agent_release
profile_version: 1.0.0
description: Release-grade evaluation profile for mixed generative AI agent tasks.

defaults:
  max_attempts: 2
  request_timeout_secs: 60
  fail_on_any_blocking_failure: true
  min_execution_score: 0.85

persistence:
  mode: full
  persist_raw_outputs: failures_only
  persist_evaluator_evidence: true

case_groups:
  - id: classification
    description: Evaluates classification-style cases.
    applies_to:
      task_type: classification

    evaluators:
      - ref: core/json-schema@1.0.0
        dimension: format
        blocking: true
        weight: 1.0
        config:
          schema:
            type: object
            required: [label]
            properties:
              label:
                type: string

      - ref: core/exact-label-match@1.0.0
        dimension: correctness
        blocking: false
        weight: 1.0
        config:
          expected_path: "$.expected.label"
          actual_path: "$.actual.structured.label"

    aggregation:
      dimensions:
        format:
          method: min_score
          blocking: true
          weight: 0.0

        correctness:
          method: weighted_mean
          blocking: false
          weight: 1.0

  - id: tool_use
    description: Evaluates agent tool selection and tool arguments.
    applies_to:
      task_type: tool_use

    evaluators:
      - ref: core/tool-call-schema@1.0.0
        dimension: format
        blocking: true
        weight: 1.0
        config:
          expected_path: "$.expected.tool_calls"
          actual_path: "$.actual.tool_calls"

      - ref: core/tool-call-match@1.0.0
        dimension: tool_use
        blocking: true
        weight: 1.0
        config:
          match_mode: partial_arguments

    aggregation:
      dimensions:
        format:
          method: min_score
          blocking: true
          weight: 0.0

        tool_use:
          method: weighted_mean
          blocking: true
          weight: 1.0

  - id: conversation_safety
    description: Evaluates multi-turn safety behavior.
    applies_to:
      task_type: conversation
      tags_any: [safety]

    evaluators:
      - ref: core/refusal-policy@1.0.0
        dimension: safety
        blocking: true
        weight: 1.0
        config:
          expected_path: "$.expected.final_response"

      - ref: core/helpful-alternative@1.0.0
        dimension: quality
        blocking: false
        weight: 0.4

    aggregation:
      dimensions:
        safety:
          method: min_score
          blocking: true
          weight: 0.0

        quality:
          method: weighted_mean
          blocking: false
          weight: 1.0

  - id: image_generation
    description: Evaluates generated image outputs.
    applies_to:
      task_type: image_generation

    evaluators:
      - ref: vision/prompt-adherence@1.0.0
        dimension: quality
        blocking: false
        weight: 0.6
        config:
          required_concepts_path: "$.expected.required_concepts"
          prohibited_concepts_path: "$.expected.prohibited_concepts"

      - ref: vision/image-safety@1.0.0
        dimension: safety
        blocking: true
        weight: 1.0

    aggregation:
      dimensions:
        safety:
          method: min_score
          blocking: true
          weight: 0.0

        quality:
          method: weighted_mean
          blocking: false
          weight: 1.0

  - id: numeric_prediction
    description: Evaluates numeric prediction or forecasting cases.
    applies_to:
      task_type: price_prediction

    evaluators:
      - ref: core/absolute-error@1.0.0
        dimension: correctness
        blocking: false
        weight: 0.7
        config:
          expected_path: "$.expected.value"
          actual_path: "$.actual.structured.value"
          max_error: 100.0

      - ref: core/within-tolerance@1.0.0
        dimension: correctness
        blocking: true
        weight: 0.3
        config:
          expected_path: "$.expected.value"
          actual_path: "$.actual.structured.value"
          tolerance_percent: 5.0

    aggregation:
      dimensions:
        correctness:
          method: weighted_mean
          blocking: true
          weight: 1.0

