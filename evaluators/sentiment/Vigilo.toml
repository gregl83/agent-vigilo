[package]
manifest = "Cargo.toml"
description = "Lexicon-based sentiment evaluator"
tags = ["sentiment", "classification", "example"]

[package.metadata]
owner = "evaluators-team"
tier = "example"

[wit]
path = "../../wit/evaluator.wit"
world = "evaluator-world"
package = "vigilo:evaluator"
version = "0.1.0"
interface = "evaluator"
strict = true

[profile.dev]
wasm = "wasm32-wasip2/debug/sentiment.wasm"

[profile.release]
wasm = "wasm32-wasip2/release/sentiment.wasm"
