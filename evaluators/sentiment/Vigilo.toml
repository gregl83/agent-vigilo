[package]
manifest = "Cargo.toml"
description = "Basic English-only lexicon sentiment evaluator (example)"
tags = ["sentiment", "classification", "example", "basic", "english-only"]

[package.metadata]
owner = "evaluators-team"
tier = "example"
language_scope = "en"
maturity = "basic"
intended_use = "example_only"

[wit]
path = "../../wit/evaluator.wit"
world = "evaluator-world"
package = "vigilo:evaluator"
version = "0.1.0"
interface = "evaluator"
strict = true

[profile.dev]
wasm = "wasm32-wasip2/debug/sentiment_basic_en.wasm"

[profile.release]
wasm = "wasm32-wasip2/release/sentiment_basic_en.wasm"
